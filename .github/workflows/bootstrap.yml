name: Bootstrap Workflows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Update apps.jsonc
        run: bun scripts/update-apps-jsonc.ts

      - name: Generate missing workflows
        run: bun scripts/generate-workflows.ts

      - name: Commit generated workflows and apps.jsonc
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A apps.jsonc

          if git diff --cached --quiet; then
            echo "No new workflows generated"
          else
            git commit -m "ci: atualizar workflows e apps.jsonc [skip ci]"
            git push
          fi
