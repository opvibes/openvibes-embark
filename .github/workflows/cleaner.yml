name: Orphan Apps Cleaner

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Cleanup orphan workflows
        run: bun scripts/cleanup-orphan-workflows.ts

      - name: Cleanup orphan cloud resources
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN_PAGES }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          DOMAIN: ${{ secrets.DOMAIN }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: bun scripts/cleanup-orphan-apps.ts

      - name: Update apps.jsonc
        run: bun scripts/update-apps-jsonc.ts

      - name: Commit cleanup changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A .github/workflows/ apps.jsonc

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: limpeza de workflows e apps órfãos [skip ci]"
            git push
          fi
