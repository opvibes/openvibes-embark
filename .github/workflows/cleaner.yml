name: Orphan Apps Cleaner

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Cleanup orphan workflows
        run: bun scripts/cleanup-orphan-workflows.ts

      - name: Find orphaned apps
        id: orphans
        run: |
          ORPHANS=$(bun scripts/cleanup-cloudflare-apps.ts find-orphans 2>/dev/null | tail -n +2)

          # Fallback to empty array if output is empty or not valid JSON
          if [ -z "$ORPHANS" ] || ! echo "$ORPHANS" | jq 'length' >/dev/null 2>&1; then
            ORPHANS="[]"
          fi

          # Use multiline delimiter for GITHUB_OUTPUT (JSON can span multiple lines)
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "data<<$EOF" >> $GITHUB_OUTPUT
          echo "$ORPHANS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

          COUNT=$(echo "$ORPHANS" | jq 'length')
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Found $COUNT orphaned app(s)"

      - name: Clean cloud resources for each orphan
        if: steps.orphans.outputs.count != '0'
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN_PAGES }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          DOMAIN: ${{ secrets.DOMAIN }}
          NETLIFY_TOKEN: ${{ secrets.NETLIFY_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          ORPHANS: ${{ steps.orphans.outputs.data }}
        run: |
          DOMAIN_PREFIX="${DOMAIN%%.*}"
          ORPHAN_COUNT=$(echo "$ORPHANS" | jq 'length')

          for i in $(seq 0 $((ORPHAN_COUNT - 1))); do
            ENTRY=$(echo "$ORPHANS" | jq ".[$i]")
            FOLDER_NAME=$(echo "$ENTRY" | jq -r '.folderName')
            SUBDOMAIN=$(echo "$ENTRY" | jq -r '.subdomain')
            ROOT_DOMAIN=$(echo "$ENTRY" | jq -r '.rootDomain')
            APP_DEPLOYMENT=$(echo "$ENTRY" | jq -r '.appDeployment // "cloudflare-pages"')
            CLOUDFLARE_USE=$(echo "$ENTRY" | jq -r '.cloudflareUse // "true"')

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Cleaning orphaned app: $FOLDER_NAME"
            echo "  Deploy target : $APP_DEPLOYMENT"
            echo "  Cloudflare DNS: $CLOUDFLARE_USE"
            echo "  Subdomain     : $SUBDOMAIN"

            # Determine full domain
            if [ "$ROOT_DOMAIN" = "true" ]; then
              FULL_DOMAIN="${DOMAIN}"
            else
              FULL_DOMAIN="${SUBDOMAIN}.${DOMAIN}"
            fi

            # Skip if no subdomain and not root domain
            if [ -z "$SUBDOMAIN" ] && [ "$ROOT_DOMAIN" != "true" ]; then
              echo "⚠️  No subdomain configured, skipping cloud cleanup for $FOLDER_NAME"
              continue
            fi

            # ── Clean deploy target ──────────────────────────────

            if [ "$APP_DEPLOYMENT" = "cloudflare-pages" ]; then
              # Determine Cloudflare Pages project name
              if [ "$ROOT_DOMAIN" = "true" ]; then
                PROJECT_NAME="${DOMAIN_PREFIX}"
              else
                PROJECT_NAME=$(echo "${DOMAIN_PREFIX}-${SUBDOMAIN}" | tr '.' '-')
              fi

              echo ""
              echo "→ Removing custom domain from Pages project..."
              REMOVE_DOMAIN_RESP=$(curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/domains/${FULL_DOMAIN}" \
                -H "Authorization: Bearer ${CF_TOKEN}" \
                -H "Content-Type: application/json")

              REMOVE_DOMAIN_SUCCESS=$(echo "$REMOVE_DOMAIN_RESP" | jq -r '.success')
              if [ "$REMOVE_DOMAIN_SUCCESS" = "true" ]; then
                echo "  ✓ Custom domain removed: $FULL_DOMAIN"
              else
                REMOVE_DOMAIN_ERR=$(echo "$REMOVE_DOMAIN_RESP" | jq -r '.errors[0].message // "Unknown"')
                echo "  ⚠️  Could not remove custom domain: $REMOVE_DOMAIN_ERR (may not exist)"
              fi

              echo ""
              echo "→ Deleting Cloudflare Pages project: $PROJECT_NAME..."
              DELETE_PROJECT_RESP=$(curl -s -X DELETE \
                "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}" \
                -H "Authorization: Bearer ${CF_TOKEN}" \
                -H "Content-Type: application/json")

              DELETE_PROJECT_SUCCESS=$(echo "$DELETE_PROJECT_RESP" | jq -r '.success')
              if [ "$DELETE_PROJECT_SUCCESS" = "true" ]; then
                echo "  ✓ Pages project deleted: $PROJECT_NAME"
              else
                DELETE_PROJECT_ERR=$(echo "$DELETE_PROJECT_RESP" | jq -r '.errors[0].message // "Unknown"')
                DELETE_PROJECT_CODE=$(echo "$DELETE_PROJECT_RESP" | jq -r '.errors[0].code // 0')
                if [ "$DELETE_PROJECT_CODE" = "8000007" ]; then
                  echo "  ✓ Pages project not found (already deleted): $PROJECT_NAME"
                else
                  echo "  ✗ Failed to delete Pages project: $DELETE_PROJECT_ERR"
                  echo "    ⚠️  Check that CF_TOKEN_PAGES has 'Cloudflare Pages:Edit' permission"
                fi
              fi

            elif [ "$APP_DEPLOYMENT" = "netlify" ]; then
              SITE_NAME="${SUBDOMAIN}-embark"

              echo ""
              echo "→ Looking up Netlify site: $SITE_NAME..."
              SITE_RESP=$(curl -s \
                "https://api.netlify.com/api/v1/sites/${SITE_NAME}.netlify.app" \
                -H "Authorization: Bearer ${NETLIFY_TOKEN}")

              SITE_ID=$(echo "$SITE_RESP" | jq -r '.id // empty')

              if [ -n "$SITE_ID" ] && [ "$SITE_ID" != "null" ]; then
                echo ""
                echo "→ Deleting Netlify site: $SITE_NAME (ID: $SITE_ID)..."
                DELETE_SITE_RESP=$(curl -s -X DELETE \
                  "https://api.netlify.com/api/v1/sites/${SITE_ID}" \
                  -H "Authorization: Bearer ${NETLIFY_TOKEN}")

                # Netlify returns 204 No Content on success (empty body)
                if [ -z "$DELETE_SITE_RESP" ]; then
                  echo "  ✓ Netlify site deleted: $SITE_NAME"
                else
                  DELETE_SITE_ERR=$(echo "$DELETE_SITE_RESP" | jq -r '.message // "Unknown"')
                  echo "  ✗ Failed to delete Netlify site: $DELETE_SITE_ERR"
                fi
              else
                echo "  ✓ Netlify site not found (already deleted): $SITE_NAME"
              fi

            elif [ "$APP_DEPLOYMENT" = "gcp" ]; then
              SERVICE_NAME="$SUBDOMAIN"

              if [ -n "$GCP_SA_KEY" ] && [ -n "$GCP_PROJECT_ID" ]; then
                echo ""
                echo "→ Authenticating with GCP..."
                echo "$GCP_SA_KEY" | base64 -d > /tmp/gcp-key.json 2>/dev/null || echo "$GCP_SA_KEY" > /tmp/gcp-key.json
                gcloud auth activate-service-account --key-file=/tmp/gcp-key.json --quiet 2>/dev/null || true
                gcloud config set project "$GCP_PROJECT_ID" --quiet 2>/dev/null || true
                rm -f /tmp/gcp-key.json

                REGION="${GCP_REGION:-us-central1}"

                echo ""
                echo "→ Deleting Cloud Run service: $SERVICE_NAME (region: $REGION)..."
                if gcloud run services delete "$SERVICE_NAME" --region="$REGION" --quiet 2>/dev/null; then
                  echo "  ✓ Cloud Run service deleted: $SERVICE_NAME"
                else
                  echo "  ⚠️  Cloud Run service not found or could not be deleted: $SERVICE_NAME"
                fi
              else
                echo "  ⚠️  GCP credentials not configured, skipping Cloud Run cleanup for $FOLDER_NAME"
              fi

            elif [ "$APP_DEPLOYMENT" = "other" ]; then
              echo "  ℹ️  Deploy target is 'other' — no cloud resources to clean"

            else
              echo "  ⚠️  Unknown deploy target: $APP_DEPLOYMENT — skipping cloud cleanup"
            fi

            # ── Clean Cloudflare DNS (if cloudflareUse is true) ──

            if [ "$CLOUDFLARE_USE" = "true" ]; then
              echo ""
              echo "→ Deleting DNS record: $FULL_DOMAIN..."
              DNS_RECORDS_RESP=$(curl -s -X GET \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?name=${FULL_DOMAIN}" \
                -H "Authorization: Bearer ${CF_TOKEN}" \
                -H "Content-Type: application/json")

              DNS_RECORD_ID=$(echo "$DNS_RECORDS_RESP" | jq -r '.result[0].id // empty')
              if [ -n "$DNS_RECORD_ID" ] && [ "$DNS_RECORD_ID" != "null" ]; then
                DELETE_DNS_RESP=$(curl -s -X DELETE \
                  "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${DNS_RECORD_ID}" \
                  -H "Authorization: Bearer ${CF_TOKEN}" \
                  -H "Content-Type: application/json")

                DELETE_DNS_SUCCESS=$(echo "$DELETE_DNS_RESP" | jq -r '.success')
                if [ "$DELETE_DNS_SUCCESS" = "true" ]; then
                  echo "  ✓ DNS record deleted: $FULL_DOMAIN"
                else
                  DELETE_DNS_ERR=$(echo "$DELETE_DNS_RESP" | jq -r '.errors[0].message // "Unknown"')
                  echo "  ✗ Failed to delete DNS record: $DELETE_DNS_ERR"
                fi
              else
                echo "  ✓ No DNS record found for $FULL_DOMAIN (already deleted or never created)"
              fi
            fi
          done

      - name: Remove orphan entries from apps.jsonc
        if: steps.orphans.outputs.count != '0'
        env:
          ORPHAN_DATA: ${{ steps.orphans.outputs.data }}
        run: |
          COMPACT=$(echo "$ORPHAN_DATA" | jq -c '.')
          bun scripts/cleanup-cloudflare-apps.ts remove-entries "--data=$COMPACT"

      - name: Commit cleanup changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A .github/workflows/ apps.jsonc

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: limpeza de workflows e apps órfãos [skip ci]"
            git push
          fi
