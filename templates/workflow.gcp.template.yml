name: Deploy __PACKAGE_NAME__

on:
  push:
    branches: [main]
    paths:
      - "packages/__PACKAGE_NAME__/**"
  workflow_dispatch:

env:
  PACKAGE_PATH: packages/__PACKAGE_NAME__
  SUBDOMAIN: __SUBDOMAIN__
  DOMAIN: ${{ secrets.DOMAIN }}
  IMAGE_NAME: __PACKAGE_NAME_LOWERCASE__

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4__SUBMODULES_WITH__

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run --cwd $PACKAGE_PATH build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/embark/${{ env.IMAGE_NAME }}:latest \
            $PACKAGE_PATH

      - name: Push Docker image
        run: |
          docker push \
            ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/embark/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.IMAGE_NAME }} \
            --image ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/embark/${{ env.IMAGE_NAME }}:latest \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --quiet

          SERVICE_URL=$(gcloud run services describe ${{ env.IMAGE_NAME }} \
            --region ${{ secrets.GCP_REGION }} \
            --format 'value(status.url)')

          echo "SITE_URL=$SERVICE_URL" >> $GITHUB_ENV
