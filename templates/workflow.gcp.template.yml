name: Deploy __PACKAGE_NAME__

on:
  push:
    branches: [main]
    paths:
      - "packages/__PACKAGE_NAME__/**"
__SUBMODULE_PATH__
  workflow_dispatch:

env:
  PACKAGE_PATH: packages/__PACKAGE_NAME__
  SUBDOMAIN: __SUBDOMAIN__
  DOMAIN: ${{ secrets.DOMAIN }}
  IMAGE_NAME: __PACKAGE_NAME_LOWERCASE__

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4__SUBMODULES_WITH__

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run --cwd $PACKAGE_PATH build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-__PACKAGE_NAME__
          path: packages/__PACKAGE_NAME__
          retention-days: 1

  docker:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      image_url: ${{ steps.push.outputs.image_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-__PACKAGE_NAME__
          path: packages/__PACKAGE_NAME__

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        id: push
        run: |
          IMAGE_URL="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/embark/${{ env.IMAGE_NAME }}:latest"
          docker build -t "$IMAGE_URL" packages/__PACKAGE_NAME__
          docker push "$IMAGE_URL"
          echo "image_url=$IMAGE_URL" >> $GITHUB_OUTPUT

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.run.outputs.service_url }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: run
        run: |
          gcloud run deploy ${{ env.IMAGE_NAME }} \
            --image ${{ needs.docker.outputs.image_url }} \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --quiet

          SERVICE_URL=$(gcloud run services describe ${{ env.IMAGE_NAME }} \
            --region ${{ secrets.GCP_REGION }} \
            --format 'value(status.url)')

          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT

  dns:
    if: __CLOUDFLARE_IF__
    needs: deploy
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ needs.deploy.outputs.service_url }}
    steps:
      - name: Get or Create subdomain on Cloudflare
        run: |
          HOSTNAME=$(echo $SITE_URL | sed -E 's|https?://||')

          EXISTING=$(curl -s "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records?name=${SUBDOMAIN}.${DOMAIN}" \
            -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}")

          RECORD_ID=$(echo "$EXISTING" | jq -r '.result[0].id // empty')

          if [ -n "$RECORD_ID" ] && [ "$RECORD_ID" != "null" ]; then
            echo "✓ DNS record already exists"
          else
            echo "Creating DNS record..."

            RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CF_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data "{
                \"type\": \"CNAME\",
                \"name\": \"${SUBDOMAIN}\",
                \"content\": \"${HOSTNAME}\",
                \"ttl\": 120,
                \"proxied\": true
              }")

            echo "$RESPONSE"
          fi
