name: Deploy __PACKAGE_NAME__

on:
  push:
    branches: [main]
    paths:
      - "packages/__PACKAGE_NAME__/**"
__SUBMODULE_PATH__
  workflow_dispatch:

env:
  PACKAGE_PATH: packages/__PACKAGE_NAME__
  SUBDOMAIN: __SUBDOMAIN__
  DOMAIN: ${{ secrets.DOMAIN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4__SUBMODULES_WITH__

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run --cwd $PACKAGE_PATH build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-__PACKAGE_NAME__
          path: packages/__PACKAGE_NAME__/dist
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-__PACKAGE_NAME__
          path: packages/__PACKAGE_NAME__/dist
